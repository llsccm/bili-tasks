name: Build and Publish Release Branch

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-branch
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish to releases branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Prepare release files
        run: |
          mkdir -p release
          cp -R dist release/dist
          cp package.json release/package.json

      - name: Publish to releases branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: releases
          publish_dir: ./release
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'chore: publish build artifacts'
